# ═══════════════════════════════════════════════════════════════════════
# BSM 70B Production DPO Config — Axolotl + QLoRA + DeepSpeed ZeRO-3
# ═══════════════════════════════════════════════════════════════════════
#
# Run AFTER SFT completes. Uses merged SFT model as base.
# Teaches the model to prefer expert-quality explanations over weak ones.
#
# Hardware: 2× H100 SXM 80GB (same pod as SFT)
# Time:     ~1-2 hours
# Requires: ≥50 DPO pairs
#
# Command:  accelerate launch --num_processes 2 -m axolotl.cli.train axolotl_dpo_config.yaml
# ═══════════════════════════════════════════════════════════════════════

base_model: ./bsm-70b-sft-merged
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer

load_in_4bit: true
strict: false

chat_template: llama3

# ── DeepSpeed ZeRO-3 ────────────────────────────────────────────────
deepspeed: deepspeed_config.json

# ── Dataset ───────────────────────────────────────────────────────────
# DPO data fields: prompt, chosen, rejected
datasets:
  - path: ./llm_data/dpo.jsonl
    type: chatml_format.prompt_chosen_rejected

sequence_len: 2048
sample_packing: false
pad_to_sequence_len: true

# ── LoRA Config ───────────────────────────────────────────────────────
adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_linear: true

# ── DPO Hyperparameters ──────────────────────────────────────────────
rl: dpo
dpo_beta: 0.1

val_set_size: 0.1
learning_rate: 5e-6
num_epochs: 2
optimizer: adamw_torch
lr_scheduler: cosine
warmup_ratio: 0.1
weight_decay: 0.01

# Effective = micro_batch × gradient_accum × num_gpus = 1 × 2 × 2 = 4
train_batch_size: 4
micro_batch_size: 1
gradient_accumulation_steps: 2

# ── Mixed Precision ───────────────────────────────────────────────────
bf16: true
tf32: true

# ── Saving ────────────────────────────────────────────────────────────
save_strategy: epoch
save_total_limit: 2
output_dir: ./bsm-70b-dpo

# ── Logging ───────────────────────────────────────────────────────────
logging_steps: 10

# ── Flash Attention + Gradient Checkpointing ─────────────────────────
flash_attention: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
