# ═══════════════════════════════════════════════════════════════════════
# BSM 70B Production SFT Config — Axolotl + QLoRA + DeepSpeed ZeRO-3
# ═══════════════════════════════════════════════════════════════════════
#
# Model:    Llama-3.1-70B-Instruct
# Hardware: 2× H100 SXM 80GB (Vast.ai)
# Strategy: DeepSpeed ZeRO-3 shards model/grads/optimizer across GPUs
#           + CPU offload for optimizer states
# Time:     ~4-6 hours SFT
#
# Command:  accelerate launch --num_processes 2 -m axolotl.cli.train axolotl_config.yaml
# ═══════════════════════════════════════════════════════════════════════

base_model: meta-llama/Llama-3.1-70B-Instruct
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer

# QLoRA — 4-bit quantized base model
load_in_4bit: true
strict: false

# Chat template — Llama 3.1 instruct format
chat_template: llama3

# Llama 3.1 has no pad token — use eos_token
special_tokens:
  pad_token: "<|end_of_text|>"

# ── DeepSpeed ZeRO-3 — proven multi-GPU approach for 70B ────────────
deepspeed: deepspeed_config.json

# ── Datasets ──────────────────────────────────────────────────────────
# Golden examples weighted 3× to anchor quality baseline
datasets:
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_combined_prepared.jsonl
    type: completion

sequence_len: 2048
sample_packing: false
pad_to_sequence_len: true

# ── LoRA Config ───────────────────────────────────────────────────────
# r=32 for maximum domain adaptation capacity
adapter: lora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

# ── Training Hyperparameters ──────────────────────────────────────────
val_set_size: 0.05
learning_rate: 1.5e-5
num_epochs: 3
optimizer: adamw_torch
lr_scheduler: cosine
warmup_ratio: 0.06
weight_decay: 0.01

# Effective batch = micro_batch × gradient_accum × num_gpus = 1 × 4 × 2 = 8
train_batch_size: 8
micro_batch_size: 1
gradient_accumulation_steps: 4

# ── Mixed Precision ───────────────────────────────────────────────────
bf16: true
tf32: true

# ── Saving ────────────────────────────────────────────────────────────
save_strategy: steps
save_steps: 100
save_total_limit: 3
output_dir: ./bsm-70b-sft

# ── Logging ───────────────────────────────────────────────────────────
logging_steps: 10

# ── Eval ──────────────────────────────────────────────────────────────
eval_steps: 50
eval_strategy: steps

# ── Flash Attention 2 (H100 native) ──────────────────────────────────
flash_attention: true

# ── Gradient Checkpointing (saves VRAM for 70B) ──────────────────────
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: true
