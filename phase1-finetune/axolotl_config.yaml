# ═══════════════════════════════════════════════════════════════════════
# BSM 70B Production SFT Config — Axolotl + QLoRA
# ═══════════════════════════════════════════════════════════════════════
#
# Model:    Llama-3.1-70B-Instruct (proven, Axolotl-tested, broad tool support)
# Hardware: 1× H100 SXM 80GB (Vast.ai or RunPod)
# Time:     ~4-6 hours SFT
# Cost:     ~$12-18 on Vast.ai ($2.50-3/hr H100 SXM)
#
# Command:  accelerate launch -m axolotl.cli.train axolotl_config.yaml
# ═══════════════════════════════════════════════════════════════════════

base_model: meta-llama/Llama-3.1-70B-Instruct
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer

# QLoRA — fits 70B on single H100 80GB
load_in_4bit: true
strict: false

# Chat template — Llama 3.1 instruct format
chat_template: llama3

# ── Datasets ──────────────────────────────────────────────────────────
# Golden examples weighted 3× to anchor quality baseline
datasets:
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_combined_prepared.jsonl
    type: completion

sequence_len: 1024
sample_packing: false
pad_to_sequence_len: true

# ── LoRA Config ───────────────────────────────────────────────────────
# r=16 to fit in VRAM — still sufficient for domain adaptation
adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_linear: true

# ── Training Hyperparameters ──────────────────────────────────────────
val_set_size: 0.05
learning_rate: 1.5e-5
num_epochs: 3
optimizer: adamw_torch
lr_scheduler: cosine
warmup_ratio: 0.06
weight_decay: 0.01

# Effective batch = micro_batch × gradient_accum = 1 × 8 = 8
train_batch_size: 8
micro_batch_size: 1
gradient_accumulation_steps: 8

# ── Mixed Precision ───────────────────────────────────────────────────
bf16: true
tf32: true

# ── Saving ────────────────────────────────────────────────────────────
save_strategy: steps
save_steps: 200
save_total_limit: 3
output_dir: ./bsm-70b-sft

# ── Logging ───────────────────────────────────────────────────────────
wandb_project: bsm-70b
wandb_run_name: bsm-70b-sft-v1
logging_steps: 10

# ── Eval ──────────────────────────────────────────────────────────────
eval_steps: 100
eval_strategy: steps

# ── Flash Attention 2 (H100 native) ──────────────────────────────────
flash_attention: true

# ── Gradient Checkpointing (saves VRAM for 70B) ──────────────────────
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
