# ═══════════════════════════════════════════════════════════════════════
# BSM 70B Production SFT Config — Axolotl + QLoRA + FSDP
# ═══════════════════════════════════════════════════════════════════════
#
# Model:    Llama-3.1-70B-Instruct
# Hardware: 2× H100 SXM 80GB (Vast.ai) — FSDP shards across both GPUs
# Time:     ~4-6 hours SFT
#
# Command:  accelerate launch --num_processes 2 -m axolotl.cli.train axolotl_config.yaml
# ═══════════════════════════════════════════════════════════════════════

base_model: meta-llama/Llama-3.1-70B-Instruct
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer

# QLoRA — 4-bit base model, FSDP shards across 2× H100
load_in_4bit: true
strict: false

# Chat template — Llama 3.1 instruct format
chat_template: llama3

# ── FSDP — shards model across both GPUs ────────────────────────────
fsdp:
  - full_shard
  - auto_wrap
fsdp_config:
  fsdp_limit_all_gathers: true
  fsdp_sync_module_states: true
  fsdp_offload_params: false
  fsdp_use_orig_params: true
  fsdp_cpu_ram_efficient_loading: true
  fsdp_transformer_layer_cls_to_wrap: LlamaDecoderLayer
  fsdp_state_dict_type: FULL_STATE_DICT

# ── Datasets ──────────────────────────────────────────────────────────
# Golden examples weighted 3× to anchor quality baseline
datasets:
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_golden_prepared.jsonl
    type: completion
  - path: ./llm_data/sft_combined_prepared.jsonl
    type: completion

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

# ── LoRA Config ───────────────────────────────────────────────────────
adapter: lora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

# ── Training Hyperparameters ──────────────────────────────────────────
val_set_size: 0.05
learning_rate: 1.5e-5
num_epochs: 3
optimizer: adamw_torch
lr_scheduler: cosine
warmup_ratio: 0.06
weight_decay: 0.01

train_batch_size: 8
micro_batch_size: 1
gradient_accumulation_steps: 4

# ── Mixed Precision ───────────────────────────────────────────────────
bf16: true
tf32: true

# ── Saving ────────────────────────────────────────────────────────────
save_strategy: steps
save_steps: 200
save_total_limit: 3
output_dir: ./bsm-70b-sft

# ── Logging ───────────────────────────────────────────────────────────
wandb_project: bsm-70b
wandb_run_name: bsm-70b-sft-v1
logging_steps: 10

# ── Eval ──────────────────────────────────────────────────────────────
eval_steps: 100
eval_strategy: steps

# ── Flash Attention 2 (H100 native) ──────────────────────────────────
flash_attention: true

# ── Gradient Checkpointing (saves VRAM for 70B) ──────────────────────
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
