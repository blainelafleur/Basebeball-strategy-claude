<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSM Scenario Rating Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; line-height: 1.5; }
  .header { background: #1a472a; color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 1.4rem; }
  .header .progress { margin-top: 8px; font-size: 0.9rem; opacity: 0.9; }
  .progress-bar { width: 200px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; margin: 6px auto 0; }
  .progress-fill { height: 100%; background: #4ade80; border-radius: 3px; transition: width 0.3s; }
  .controls { background: white; padding: 16px 20px; border-bottom: 1px solid #ddd; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls label { font-weight: 600; font-size: 0.85rem; }
  .controls input[type="file"] { font-size: 0.85rem; }
  .controls button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .btn-primary { background: #1a472a; color: white; }
  .btn-primary:hover { background: #2d6a3e; }
  .btn-secondary { background: #e5e7eb; color: #333; }
  .btn-secondary:hover { background: #d1d5db; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-skip { background: #f59e0b; color: white; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  .empty-state { text-align: center; padding: 80px 20px; color: #666; }
  .empty-state h2 { margin-bottom: 12px; }
  .empty-state p { max-width: 500px; margin: 0 auto 20px; }
  .scenario-card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .scenario-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
  .badge-position { background: #dbeafe; color: #1e40af; }
  .badge-diff { background: #fef3c7; color: #92400e; }
  .badge-critique { background: #d1fae5; color: #065f46; }
  .badge-ai { background: #e9d5ff; color: #6b21a8; }
  .scenario-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .scenario-desc { color: #555; margin-bottom: 16px; font-size: 0.95rem; }
  .situation-bar { background: #f0f9ff; padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; color: #1e40af; }
  .options-grid { display: grid; gap: 8px; margin-bottom: 16px; }
  .option { padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; position: relative; }
  .option.best { border-color: #22c55e; background: #f0fdf4; }
  .option .rate-badge { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: #f3f4f6; }
  .option.best .rate-badge { background: #dcfce7; color: #166534; }
  .explanation { margin-top: 6px; font-size: 0.82rem; color: #666; padding-left: 20px; border-left: 2px solid #e5e7eb; }
  .option.best .explanation { border-left-color: #22c55e; color: #333; }
  .concept-tag { background: #fef3c7; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 20px; display: inline-block; }
  .rating-section { border-top: 2px solid #e5e7eb; padding-top: 20px; margin-top: 16px; }
  .rating-section h3 { font-size: 1rem; margin-bottom: 16px; color: #1a472a; }
  .rubric-grid { display: grid; gap: 16px; }
  .rubric-item { display: flex; align-items: center; gap: 12px; }
  .rubric-label { width: 180px; font-size: 0.85rem; font-weight: 600; flex-shrink: 0; }
  .rubric-desc { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .star-row { display: flex; gap: 4px; }
  .star { width: 28px; height: 28px; border: 2px solid #d1d5db; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: #999; transition: all 0.15s; }
  .star:hover { border-color: #f59e0b; background: #fffbeb; color: #f59e0b; }
  .star.active { border-color: #f59e0b; background: #fef3c7; color: #d97706; }
  .pref-section { margin-top: 20px; }
  .pref-section h4 { font-size: 0.9rem; margin-bottom: 8px; }
  .pref-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pref-btn { padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-size: 0.85rem; text-align: left; background: white; transition: all 0.15s; }
  .pref-btn:hover { border-color: #3b82f6; background: #eff6ff; }
  .pref-btn.selected { border-color: #3b82f6; background: #dbeafe; }
  .comments-section { margin-top: 16px; }
  .comments-section textarea { width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 0.85rem; min-height: 60px; resize: vertical; font-family: inherit; }
  .comments-section textarea:focus { outline: none; border-color: #3b82f6; }
  .action-row { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .nav-row { display: flex; justify-content: space-between; margin-top: 20px; }
  .stats-bar { background: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 16px; display: flex; justify-content: space-around; font-size: 0.85rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .stat-item { text-align: center; }
  .stat-value { font-size: 1.3rem; font-weight: 700; color: #1a472a; }
  .stat-label { font-size: 0.75rem; color: #888; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 10px; border: 1px solid #d1d5db; border-radius: 12px; font-size: 0.75rem; cursor: pointer; background: white; }
  .filter-btn.active { background: #1a472a; color: white; border-color: #1a472a; }
</style>
</head>
<body>

<div class="header">
  <h1>BSM Scenario Rating Tool</h1>
  <div class="progress" id="progressText">Load a scenario file to begin</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="controls">
  <label>Load scenarios:</label>
  <input type="file" id="fileInput" accept=".json">
  <button class="btn-primary" id="exportBtn" disabled>Export Rated</button>
  <button class="btn-secondary" id="exportAllBtn" disabled>Export All (with unrated)</button>
  <div style="flex:1"></div>
  <div class="filter-row" id="filterRow"></div>
</div>

<div class="container" id="main">
  <div class="empty-state">
    <h2>No scenarios loaded</h2>
    <p>Click "Load scenarios" above to open a <code>scenarios-to-rate-*.json</code> file generated by the batch script.</p>
    <p style="font-size:0.85rem; color:#999;">Or drag and drop the JSON file onto this page.</p>
  </div>
</div>

<script>
const state = {
  scenarios: [],
  currentIndex: 0,
  filter: "all"
};

// ─── File loading ─────────────────────────────────────────────────────────────

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

document.body.addEventListener("dragover", e => e.preventDefault());
document.body.addEventListener("drop", e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state.scenarios = JSON.parse(e.target.result);
      state.currentIndex = 0;
      // Find first unrated
      const firstUnrated = state.scenarios.findIndex(s => !s.ratings);
      if (firstUnrated >= 0) state.currentIndex = firstUnrated;
      buildFilterButtons();
      render();
      document.getElementById("exportBtn").disabled = false;
      document.getElementById("exportAllBtn").disabled = false;
    } catch (err) {
      alert("Failed to parse JSON: " + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── Filter buttons ───────────────────────────────────────────────────────────

function buildFilterButtons() {
  const positions = [...new Set(state.scenarios.map(s => s.position))].sort();
  const row = document.getElementById("filterRow");
  row.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "filter-btn active";
  allBtn.textContent = `All (${state.scenarios.length})`;
  allBtn.onclick = () => { state.filter = "all"; state.currentIndex = 0; buildFilterButtons(); render(); };
  row.appendChild(allBtn);

  const unratedBtn = document.createElement("button");
  const unratedCount = state.scenarios.filter(s => !s.ratings).length;
  unratedBtn.className = "filter-btn" + (state.filter === "unrated" ? " active" : "");
  unratedBtn.textContent = `Unrated (${unratedCount})`;
  unratedBtn.onclick = () => { state.filter = "unrated"; state.currentIndex = 0; buildFilterButtons(); render(); };
  row.appendChild(unratedBtn);

  for (const pos of positions) {
    const btn = document.createElement("button");
    const count = state.scenarios.filter(s => s.position === pos).length;
    btn.className = "filter-btn" + (state.filter === pos ? " active" : "");
    btn.textContent = `${pos} (${count})`;
    btn.onclick = () => { state.filter = pos; state.currentIndex = 0; buildFilterButtons(); render(); };
    row.appendChild(btn);
  }
}

function getFiltered() {
  if (state.filter === "all") return state.scenarios;
  if (state.filter === "unrated") return state.scenarios.filter(s => !s.ratings);
  return state.scenarios.filter(s => s.position === state.filter);
}

// ─── Rendering ────────────────────────────────────────────────────────────────

function render() {
  const filtered = getFiltered();
  const rated = state.scenarios.filter(s => s.ratings).length;
  const total = state.scenarios.length;

  document.getElementById("progressText").textContent = `${rated}/${total} rated (${filtered.length} showing)`;
  document.getElementById("progressFill").style.width = `${total > 0 ? (rated / total * 100) : 0}%`;

  const main = document.getElementById("main");

  if (filtered.length === 0) {
    main.innerHTML = '<div class="empty-state"><h2>No scenarios match filter</h2></div>';
    return;
  }

  if (state.currentIndex >= filtered.length) state.currentIndex = filtered.length - 1;
  if (state.currentIndex < 0) state.currentIndex = 0;

  const item = filtered[state.currentIndex];
  const sc = item.scenario;
  const sit = sc.situation || {};

  // Stats bar
  const avgScore = rated > 0
    ? (state.scenarios.filter(s => s.ratings).reduce((sum, s) => sum + (s.ratings.factualAccuracy + s.ratings.explanationStrength + s.ratings.ageAppropriateness + s.ratings.educationalValue + s.ratings.varietyEngagement) / 5, 0) / rated).toFixed(1)
    : "-";

  let html = `
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-value">${rated}</div><div class="stat-label">Rated</div></div>
      <div class="stat-item"><div class="stat-value">${total - rated}</div><div class="stat-label">Remaining</div></div>
      <div class="stat-item"><div class="stat-value">${avgScore}</div><div class="stat-label">Avg Score</div></div>
      <div class="stat-item"><div class="stat-value">${state.currentIndex + 1}/${filtered.length}</div><div class="stat-label">Current</div></div>
    </div>

    <div class="scenario-card">
      <div class="scenario-meta">
        <span class="badge badge-position">${item.position}</span>
        <span class="badge badge-diff">${item.difficulty || "diff " + sc.diff}</span>
        ${item.critiqueScore ? `<span class="badge badge-critique">Critique: ${item.critiqueScore}/10</span>` : ""}
        <span class="badge badge-ai">${item.pipelineModel || "AI"}</span>
      </div>

      <div class="scenario-title">${sc.title}</div>
      <div class="scenario-desc">${sc.description}</div>

      ${sit.inning ? `<div class="situation-bar">${sit.inning} | ${sit.outs} out${sit.outs !== 1 ? "s" : ""} | Count: ${sit.count || "0-0"} | Runners: ${(sit.runners || []).length === 0 ? "None" : sit.runners.join(", ")} | Score: ${(sit.score || [0,0]).join("-")}</div>` : ""}

      <div class="options-grid">
  `;

  for (let i = 0; i < (sc.options || []).length; i++) {
    const isBest = i === sc.best;
    html += `
      <div class="option ${isBest ? "best" : ""}">
        <strong>${String.fromCharCode(65 + i)}.</strong> ${sc.options[i]}
        <span class="rate-badge">${sc.rates?.[i] || "?"}%</span>
        <div class="explanation">${sc.explanations?.[i] || ""}</div>
      </div>
    `;
  }

  html += `</div>`;

  if (sc.concept) {
    html += `<div class="concept-tag">Concept: ${sc.concept}</div>`;
  }

  // Rating section
  const existing = item.ratings || {};
  const dims = [
    { key: "factualAccuracy", label: "Factual Accuracy", desc: "Correct rules, cutoffs, RE24, no role violations" },
    { key: "explanationStrength", label: "Explanation Strength", desc: "Best explanation argues FOR the answer + teaches WHY" },
    { key: "ageAppropriateness", label: "Age-Appropriateness", desc: "Language matches difficulty level, no jargon for young kids" },
    { key: "educationalValue", label: "Educational Value", desc: "Specific teaching moment, not filler, encourages learning" },
    { key: "varietyEngagement", label: "Variety & Engagement", desc: "Fresh situation, vivid description, not formulaic" }
  ];

  html += `
    <div class="rating-section">
      <h3>Coach Rating (1-10)</h3>
      <div class="rubric-grid">
  `;

  for (const dim of dims) {
    html += `
      <div class="rubric-item">
        <div>
          <div class="rubric-label">${dim.label}</div>
          <div class="rubric-desc">${dim.desc}</div>
        </div>
        <div class="star-row">
    `;
    for (let n = 1; n <= 10; n++) {
      const active = (existing[dim.key] || 0) === n;
      html += `<div class="star ${active ? "active" : ""}" data-dim="${dim.key}" data-val="${n}" onclick="setRating('${dim.key}', ${n})">${n}</div>`;
    }
    html += `</div></div>`;
  }

  html += `</div>`;

  // Preferred explanation
  html += `
    <div class="pref-section">
      <h4>Which explanation is strongest for teaching? (for DPO training)</h4>
      <div class="pref-options">
  `;
  for (let i = 0; i < (sc.options || []).length; i++) {
    const sel = item.preferredExplanation === i;
    html += `<button class="pref-btn ${sel ? "selected" : ""}" onclick="setPref(${i})"><strong>${String.fromCharCode(65 + i)}.</strong> ${(sc.explanations?.[i] || "").slice(0, 80)}${(sc.explanations?.[i] || "").length > 80 ? "..." : ""}</button>`;
  }
  html += `</div></div>`;

  // Comments
  html += `
    <div class="comments-section">
      <textarea id="comments" placeholder="Optional comments (flag Tier 1 errors, note issues, etc.)" oninput="setComments(this.value)">${item.coachComments || ""}</textarea>
    </div>

    <div class="action-row">
      <button class="btn-skip" onclick="skipScenario()">Skip</button>
      <button class="btn-primary" onclick="submitAndNext()" id="submitBtn">Submit & Next →</button>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn-secondary" onclick="navigate(-1)" ${state.currentIndex === 0 ? "disabled" : ""}>← Previous</button>
    <span style="font-size:0.85rem; color:#888;">${state.currentIndex + 1} of ${filtered.length}</span>
    <button class="btn-secondary" onclick="navigate(1)" ${state.currentIndex >= filtered.length - 1 ? "disabled" : ""}>Next →</button>
  </div>
  `;

  main.innerHTML = html;
}

// ─── Rating actions ───────────────────────────────────────────────────────────

function getCurrentItem() {
  return getFiltered()[state.currentIndex];
}

function setRating(dim, val) {
  const item = getCurrentItem();
  if (!item.ratings) item.ratings = {};
  item.ratings[dim] = val;
  // Update just the stars for this dimension without full re-render
  document.querySelectorAll(`[data-dim="${dim}"]`).forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.val) === val);
  });
  autoSave();
}

function setPref(idx) {
  const item = getCurrentItem();
  item.preferredExplanation = idx;
  document.querySelectorAll(".pref-btn").forEach((btn, i) => {
    btn.classList.toggle("selected", i === idx);
  });
  autoSave();
}

function setComments(text) {
  getCurrentItem().coachComments = text;
  autoSave();
}

function submitAndNext() {
  const item = getCurrentItem();
  const dims = ["factualAccuracy", "explanationStrength", "ageAppropriateness", "educationalValue", "varietyEngagement"];

  // Validate all dimensions rated
  if (!item.ratings || dims.some(d => !item.ratings[d])) {
    alert("Please rate all 5 dimensions before submitting.");
    return;
  }

  item.ratedAt = new Date().toISOString();
  item.overallScore = dims.reduce((sum, d) => sum + item.ratings[d], 0) / dims.length;

  const filtered = getFiltered();
  if (state.currentIndex < filtered.length - 1) {
    state.currentIndex++;
  }
  buildFilterButtons();
  render();
  autoSave();
  window.scrollTo(0, 0);
}

function skipScenario() {
  const filtered = getFiltered();
  if (state.currentIndex < filtered.length - 1) {
    state.currentIndex++;
    render();
    window.scrollTo(0, 0);
  }
}

function navigate(dir) {
  const filtered = getFiltered();
  state.currentIndex = Math.max(0, Math.min(filtered.length - 1, state.currentIndex + dir));
  render();
  window.scrollTo(0, 0);
}

// ─── Auto-save & Export ───────────────────────────────────────────────────────

function autoSave() {
  try {
    localStorage.setItem("bsm_rating_data", JSON.stringify(state.scenarios));
  } catch (e) { /* localStorage full or unavailable */ }
}

// Restore from localStorage on load
try {
  const saved = localStorage.getItem("bsm_rating_data");
  if (saved) {
    const data = JSON.parse(saved);
    if (data.length > 0 && confirm(`Found ${data.length} scenarios in progress (${data.filter(s => s.ratings).length} rated). Resume?`)) {
      state.scenarios = data;
      state.currentIndex = data.findIndex(s => !s.ratings);
      if (state.currentIndex < 0) state.currentIndex = 0;
      buildFilterButtons();
      render();
      document.getElementById("exportBtn").disabled = false;
      document.getElementById("exportAllBtn").disabled = false;
    }
  }
} catch (e) { /* no saved data */ }

document.getElementById("exportBtn").addEventListener("click", () => {
  const rated = state.scenarios.filter(s => s.ratings);
  if (rated.length === 0) { alert("No rated scenarios to export."); return; }
  downloadJSON(rated, `coach-ratings-${new Date().toISOString().split("T")[0]}.json`);
});

document.getElementById("exportAllBtn").addEventListener("click", () => {
  downloadJSON(state.scenarios, `all-scenarios-${new Date().toISOString().split("T")[0]}.json`);
});

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// Keyboard shortcuts
document.addEventListener("keydown", e => {
  if (e.target.tagName === "TEXTAREA") return;
  if (e.key === "ArrowLeft") navigate(-1);
  if (e.key === "ArrowRight") navigate(1);
  if (e.key === "Enter" && e.metaKey) submitAndNext();
});
</script>

</body>
</html>
