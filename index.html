<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baseball Strategy Master</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BSM" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <!-- TODO: Generate proper PNG icons (192x192, 512x512) for iOS Add-to-Home-Screen -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #root { min-height: 100vh; }

    /* Mobile-first responsive styles */
    @media (max-width: 480px) {
      button { min-height: 48px !important; font-size: 14px !important; }
      #root > div > div { padding-left: 8px !important; padding-right: 8px !important; }
    }
    @media (min-width: 481px) and (max-width: 768px) {
      #root > div > div { max-width: 600px; margin: 0 auto; }
    }
    @media (min-width: 769px) {
      #root > div > div { max-width: 480px; margin: 0 auto; }
    }
    /* Touch targets */
    button, [role="button"] { min-height: 44px; touch-action: manipulation; }
    /* Prevent zoom on double-tap on iOS */
    input, select, textarea { font-size: 16px; }
    /* Safe area for notch devices */
    @supports (padding: env(safe-area-inset-bottom)) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
